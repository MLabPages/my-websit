<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>果物ランダム抽選</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(180deg, #fffaf3 0%, #fff3f6 100%);
    color: #222;
  }
  .wrap {
    box-sizing: border-box;
    width: 100%;
    max-width: 860px;
    margin: 0 auto;
    padding: 22px 16px 36px;
    text-align: center;
  }
  h1 {
    font-size: clamp(28px, 5vw, 42px);
    margin: 8px 0 10px;
  }
  .sub {
    font-size: clamp(15px, 2.5vw, 18px);
    color: #555;
    margin-bottom: 18px;
    line-height: 1.6;
  }
  .card {
    background: white;
    border-radius: 22px;
    padding: 28px 12px;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    margin-bottom: 18px;
  }
  .emoji {
    font-size: clamp(96px, 18vw, 170px);
    line-height: 1;
    margin-bottom: 14px;
  }
  .name {
    font-size: clamp(34px, 7vw, 58px);
    font-weight: 800;
  }
  button {
    appearance: none;
    -webkit-appearance: none;
    border: none;
    border-radius: 999px;
    background: #ff8d5c;
    color: white;
    font-size: clamp(20px, 4.5vw, 28px);
    font-weight: 700;
    padding: 18px 30px;
    min-width: 220px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    cursor: pointer;
  }
  button:active { transform: scale(0.98); }
  .meta {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
    line-height: 1.8;
  }
  .badges {
    margin-top: 18px;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.9);
    padding: 7px 10px;
    border-radius: 999px;
    margin: 4px;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .small {
    margin-top: 10px;
    font-size: 13px;
    color: #777;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>果物ランダム抽選</h1>
    <div class="sub">ボタンを押すたびに，果物が1つランダムに表示されます。<br>授業でのグループ分けや簡単な抽選に使えます。</div>

    <div class="card">
      <div id="emoji" class="emoji">🍎</div>
      <div id="name" class="name">りんご</div>
    </div>

    <button id="drawButton" type="button">抽選する</button>

    <div class="meta">
      スマートフォンでも動くシンプル版です。<br>
      必要なら果物の種類は自由に増やせます。
    </div>

    <div class="badges" id="list"></div>
    <div class="small">現在の候補：8種類</div>
  </div>

<script>
(function () {
  var fruits = [
    { name: "りんご", emoji: "🍎" },
    { name: "みかん", emoji: "🍊" },
    { name: "ぶどう", emoji: "🍇" },
    { name: "いちご", emoji: "🍓" },
    { name: "バナナ", emoji: "🍌" },
    { name: "もも", emoji: "🍑" },
    { name: "さくらんぼ", emoji: "🍒" },
    { name: "パイナップル", emoji: "🍍" }
  ];

  var emojiEl = document.getElementById("emoji");
  var nameEl = document.getElementById("name");
  var btn = document.getElementById("drawButton");
  var listEl = document.getElementById("list");

  listEl.innerHTML = fruits.map(function (f) {
    return '<span class="badge">' + f.emoji + ' ' + f.name + '</span>';
  }).join("");

  function drawFruit() {
    var i = Math.floor(Math.random() * fruits.length);
    var fruit = fruits[i];
    emojiEl.textContent = fruit.emoji;
    nameEl.textContent = fruit.name;
  }

  btn.addEventListener("click", drawFruit);
})();
</script>
</body>
</html>
